name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile tools
        run: python -m py_compile tools/*.py

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Run PR guard
        if: github.event_name == 'pull_request'
        run: python tools/check_pr_rules.py "origin/${{ github.base_ref }}...HEAD"
